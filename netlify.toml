[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_UPLOAD_BUCKET"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/index.html"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
